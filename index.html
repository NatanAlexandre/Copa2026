<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026 • Simulador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b3e;
            --red: #c41e3a;
            --gold: #ffd700;
            --dark: #060e20;
            --card: #13245a;
            --text: #eef1fb;
            --muted: #9aa6cf;
            --green: #2ecc71;
            --blue: #3498db;
            --radius: 10px;
            --header-h: 60px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Barlow', sans-serif;
            background: linear-gradient(180deg, var(--dark) 0%, var(--navy) 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
        }

        button,
        input,
        select {
            font-family: inherit;
        }

        button {
            cursor: pointer;
        }

        img {
            display: block;
        }

        /* Cabeçalho */
        .header {
            background: var(--dark);
            border-bottom: 3px solid var(--gold);
            padding: 0 20px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 1.5px;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            font-size: 1.5rem;
        }

        .nav-desktop {
            display: flex;
            gap: 8px;
            flex: 1;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: var(--card);
            color: var(--text);
            border: 2px solid transparent;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 8px 18px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }

        .nav-btn:hover {
            border-color: var(--gold);
        }

        .nav-btn.active {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        .mobile-nav {
            display: none;
            flex: 1;
        }

        .mobile-nav select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 2px solid var(--gold);
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--gold);
            color: var(--dark);
            border: none;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn:hover {
            background: #fff2a8;
        }

        .btn.danger {
            background: var(--red);
            color: #fff;
        }

        .btn.danger:hover {
            background: #e0405a;
        }

        .btn input[type="file"] {
            display: none;
        }

        @media (max-width: 840px) {
            .nav-desktop {
                display: none;
            }
            .mobile-nav {
                display: block;
            }
            .header {
                flex-wrap: wrap;
                height: auto;
                padding: 10px 16px;
                gap: 10px;
            }
            .logo {
                font-size: 1.5rem;
            }
            .actions .btn span {
                display: none;
            }
            .btn {
                padding: 8px 12px;
            }
        }

        /* Conteúdo */
        main {
            max-width: 1340px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeSlide 0.25s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Grupos */
        .grupos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .grupo-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .grupo-card:hover {
            transform: translateY(-2px);
        }

        .grupo-head {
            padding: 12px 16px;
            background: var(--red);
            color: #fff;
            font-size: 1.4rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.7rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.complete {
            background: rgba(46, 204, 113, 0.2);
            color: var(--green);
        }

        .badge.progress {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .standings-table th,
        .standings-table td {
            padding: 8px 6px;
            text-align: center;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .standings-table th {
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.2);
        }

        .standings-table .team-cell {
            text-align: left;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.15s;
        }

        .standings-table .team-cell:hover {
            color: var(--gold);
        }

        .standings-table .team-cell-inner {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 4px;
        }

        .standings-table tr.qualified td {
            background: rgba(255, 215, 0, 0.06);
        }

        .standings-table tr.second td {
            background: rgba(52, 152, 219, 0.06);
        }

        .flag {
            width: 24px;
            height: 16px;
            object-fit: cover;
            border-radius: 2px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .pos-num {
            display: inline-block;
            width: 20px;
            text-align: center;
            font-weight: 700;
            color: var(--muted);
            font-size: 0.8rem;
        }

        /* Eliminatórias */
        .fase-section {
            margin-bottom: 32px;
        }

        .fase-title {
            border-left: 5px solid var(--gold);
            padding-left: 12px;
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .bracket-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .match-card {
            background: var(--card);
            border-radius: 8px;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s;
        }

        .match-card:hover {
            border-color: var(--gold);
        }

        .match-meta {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            gap: 10px;
        }

        .match-row .team {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            min-width: 0;
            transition: color 0.15s;
        }

        .match-row .team:hover {
            color: var(--gold);
        }

        .match-row .team.tbd {
            color: var(--muted);
            cursor: default;
            font-style: italic;
            font-weight: 400;
        }

        .match-row .team span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .match-row .score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--gold);
            min-width: 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .match-row.winner .team {
            color: var(--gold);
        }

        .match-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 4px 0;
        }

        .pk-info {
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
            font-style: italic;
        }

        /* Partidas */
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-chip {
            background: var(--card);
            border: 2px solid transparent;
            color: var(--text);
            padding: 7px 16px;
            border-radius: 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-chip.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        .filter-chip:hover:not(.active) {
            border-color: var(--gold);
        }

        .fase-header {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--gold);
            font-size: 1.3rem;
            margin: 20px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .count-badge {
            font-size: 0.7rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            background: var(--card);
            padding: 3px 10px;
            border-radius: 12px;
            color: var(--muted);
        }

        .match-item {
            background: var(--card);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: grid;
            grid-template-columns: 110px 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: border-color 0.2s;
        }

        .match-item:hover {
            border-color: var(--gold);
        }

        .match-item.done {
            border-left: 4px solid var(--green);
        }

        .match-date {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .match-date .time {
            color: var(--text);
            font-weight: 600;
        }

        .team-block {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .team-block.right {
            flex-direction: row-reverse;
        }

        .team-name-btn {
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .team-name-btn:hover {
            color: var(--gold);
        }

        .team-name-btn.tbd {
            color: var(--muted);
            cursor: default;
            font-style: italic;
            font-weight: 400;
        }

        .team-block select {
            background: var(--navy);
            color: var(--text);
            border: 1px solid var(--gold);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.85rem;
            font-family: 'Barlow Condensed', sans-serif;
            max-width: 180px;
        }

        .score-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .score-input {
            width: 48px;
            height: 38px;
            text-align: center;
            background: var(--navy);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 1.1rem;
            font-family: 'Bebas Neue', sans-serif;
            transition: border-color 0.2s;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .score-input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .score-sep {
            color: var(--muted);
            font-weight: 700;
        }

        .save-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            opacity: 0;
            transition: opacity 0.3s;
            flex-shrink: 0;
        }

        .save-dot.visible {
            opacity: 1;
        }

        .pk-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
            justify-content: center;
        }

        .pk-group input {
            width: 40px;
            height: 28px;
            text-align: center;
            background: var(--navy);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .pk-group input:focus {
            border-color: var(--gold);
            outline: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: var(--card);
            border-radius: 14px;
            max-width: 480px;
            width: 100%;
            padding: 24px;
            border: 2px solid var(--gold);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.6rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-head {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .modal-head img {
            width: 72px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.3);
        }

        .modal-head h2 {
            margin: 0;
            font-size: 1.8rem;
        }

        .modal-head .grupo-tag {
            color: var(--gold);
            font-size: 0.9rem;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 14px;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px;
        }

        .status-badge.classificado {
            background: #1d8a4a;
            color: #fff;
        }

        .status-badge.eliminado {
            background: var(--red);
            color: #fff;
        }

        .status-badge.andamento {
            background: #555;
            color: #fff;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-item {
            background: var(--navy);
            border-radius: 6px;
            padding: 10px 6px;
            text-align: center;
        }

        .stat-item .value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--gold);
        }

        .stat-item .label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px;
        }

        .recent-title {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--gold);
            letter-spacing: 1px;
            margin: 8px 0;
        }

        .recent-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .recent-list li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .result-badge {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
        }

        .result-badge.V {
            background: rgba(46, 204, 113, 0.2);
            color: var(--green);
        }

        .result-badge.E {
            background: rgba(52, 152, 219, 0.2);
            color: var(--blue);
        }

        .result-badge.D {
            background: rgba(196, 30, 58, 0.2);
            color: var(--red);
        }

        .recent-fase {
            color: var(--muted);
            font-size: 0.75rem;
            white-space: nowrap;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--gold);
            color: var(--dark);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            z-index: 300;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 600px) {
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span>⚽</span> Copa 2026</div>
        <nav class="nav-desktop" aria-label="Seções principais">
            <button class="nav-btn active" data-tab="grupos">Grupos</button>
            <button class="nav-btn" data-tab="elim">Eliminatórias</button>
            <button class="nav-btn" data-tab="partidas">Partidas</button>
        </nav>
        <div class="mobile-nav">
            <select id="mobileNav" aria-label="Navegação">
                <option value="grupos">Fase de Grupos</option>
                <option value="elim">Eliminatórias</option>
                <option value="partidas">Partidas</option>
            </select>
        </div>
        <div class="actions">
            <button class="btn" id="btnExport"><span>💾</span> Exportar</button>
            <label class="btn"><span>📥</span> Importar
                <input type="file" id="importFile" accept=".json">
            </label>
            <button class="btn danger" id="btnReset"><span>↺</span> Resetar</button>
        </div>
    </header>

    <main>
        <section id="tab-grupos" class="tab-content active">
            <div class="grupos-grid" id="gruposGrid"></div>
        </section>

        <section id="tab-elim" class="tab-content">
            <div id="elimContainer"></div>
        </section>

        <section id="tab-partidas" class="tab-content">
            <div class="toolbar" id="filters"></div>
            <div id="partidasContainer"></div>
        </section>
    </main>

    <!-- Modal de detalhes da seleção -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalName">
        <div class="modal-box">
            <button class="modal-close" aria-label="Fechar" id="modalCloseBtn">✕</button>
            <div class="modal-head">
                <img id="modalFlag" src="" alt="">
                <div>
                    <h2 id="modalName"></h2>
                    <div class="grupo-tag" id="modalGrupo"></div>
                </div>
            </div>
            <div id="modalStatus"></div>
            <div class="stat-grid" id="modalStats"></div>
            <div class="recent-title">Últimos resultados</div>
            <ul class="recent-list" id="modalRecent"></ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            /* =============================================
               DADOS BASE
               ============================================= */
            const GROUPS = {
                A: ["México", "África do Sul", "Coreia do Sul", "Tchéquia"],
                B: ["Canadá", "Bósnia e Herzegovina", "Catar", "Suíça"],
                C: ["Brasil", "Marrocos", "Haiti", "Escócia"],
                D: ["Estados Unidos", "Paraguai", "Austrália", "Turquia"],
                E: ["Alemanha", "Curaçao", "Costa do Marfim", "Equador"],
                F: ["Holanda", "Japão", "Suécia", "Tunísia"],
                G: ["Bélgica", "Egito", "Irã", "Nova Zelândia"],
                H: ["Espanha", "Cabo Verde", "Arábia Saudita", "Uruguai"],

            /* =============================================
               ESTADO GLOBAL
               ============================================= */
            let MATCHES = RAW_MATCHES.map(r => ({
                id: r[0],
                fase: r[1],
                grupo: r[2],
                t1: r[3],
                t2: r[4],
                data: r[5],
                hora: r[6],
                g1: null,
                g2: null,
                pk1: null,
                pk2: null,
                m1: null,
                m2: null
            }));

            const STORAGE_KEY = 'copa2026_v6';

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return;
                    const saved = JSON.parse(raw);
                    const map = {};
                    (saved.partidas || []).forEach(p => map[p.id] = p);
                    MATCHES.forEach(m => {
                        const s = map[m.id];
                        if (!s) return;
                        m.g1 = s.g1 ?? null;
                        m.g2 = s.g2 ?? null;
                        m.pk1 = s.pk1 ?? null;
                        m.pk2 = s.pk2 ?? null;
                        m.m1 = s.m1 ?? null;
                        m.m2 = s.m2 ?? null;
                    });
                } catch (e) { /* silencioso */ }
            }

            function persist() {
                const data = {
                    partidas: MATCHES.map(m => ({
                        id: m.id,
                        g1: m.g1,
                        g2: m.g2,
                        pk1: m.pk1,
                        pk2: m.pk2,
                        m1: m.m1,
                        m2: m.m2
                    }))
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            /* =============================================
               LÓGICA DE CLASSIFICAÇÃO
               ============================================= */
            function findMatch(id) { return MATCHES.find(m => m.id === id); }

            function groupMatches(letra) { return MATCHES.filter(m => m.fase === 'grupos' && m.grupo === letra); }

            function groupComplete(letra) {
                return groupMatches(letra).every(m => m.g1 !== null && m.g2 !== null);
            }

            function allGroupsComplete() { return Object.keys(GROUPS).every(g => groupComplete(g)); }

            function standings(letra) {
                const table = {};
                GROUPS[letra].forEach(name => table[name] = { name, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0,
                    pts: 0 });
                groupMatches(letra).forEach(m => {
                    if (m.g1 === null || m.g2 === null) return;
                    const a = table[m.t1],
                        b = table[m.t2];
                    a.j++;
                    b.j++;
                    a.gp += m.g1;
                    a.gc += m.g2;
                    b.gp += m.g2;
                    b.gc += m.g1;
                    if (m.g1 > m.g2) { a.v++;
                        a.pts += 3;
                        b.d++; } else if (m.g1 < m.g2) { b.v++;
                        b.pts += 3;
                        a.d++; } else { a.e++;
                        b.e++;
                        a.pts++;
                        b.pts++; }
                });
                const arr = Object.values(table);
                arr.forEach(t => t.sg = t.gp - t.gc);
                arr.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.sg !== a.sg) return b.sg - a.sg;
                    if (b.gp !== a.gp) return b.gp - a.gp;
                    return a.name.localeCompare(b.name, 'pt');
                });
                return arr;
            }

            function isKnockout(fase) { return ['16avos', 'oitavas', 'quartas', 'semis', '3lugar', 'final'].includes(
                    fase); }

            /* resolveTeam com side para suporte correto a 3X */
            function resolveTeam(code, match, side) {
                if (!code) return null;
                if (code === '3X') return side === 1 ? match.m1 : match.m2;
                let mm;
                if ((mm = code.match(/^([12])([A-L])$/))) {
                    // Permite visualização assim que o grupo específico estiver completo
                    if (!groupComplete(mm[2])) return null;
                    const std = standings(mm[2]);
                    const idx = parseInt(mm[1]) - 1;
                    return std[idx] ? std[idx].name : null;
                }
                if ((mm = code.match(/^W(\d+)$/))) return getWinner(parseInt(mm[1]));
                if ((mm = code.match(/^L(\d+)$/))) return getLoser(parseInt(mm[1]));
                return code;
            }

            function getWinner(id) {
                const m = findMatch(id);
                if (!m) return null;
                const a = resolveTeam(m.t1, m, 1);
                const b = resolveTeam(m.t2, m, 2);
                if (!a || !b || m.g1 === null || m.g2 === null) return null;
                if (m.g1 > m.g2) return a;
                if (m.g2 > m.g1) return b;
                if (isKnockout(m.fase) && m.pk1 !== null && m.pk2 !== null) {
                    if (m.pk1 > m.pk2) return a;
                    if (m.pk2 > m.pk1) return b;
                }
                return null;
            }

            function getLoser(id) {
                const m = findMatch(id);
                if (!m) return null;
                const a = resolveTeam(m.t1, m, 1);
                const b = resolveTeam(m.t2, m, 2);
                if (!a || !b || m.g1 === null || m.g2 === null) return null;
                if (m.g1 > m.g2) return b;
                if (m.g2 > m.g1) return a;
                if (isKnockout(m.fase) && m.pk1 !== null && m.pk2 !== null) {
                    if (m.pk1 > m.pk2) return b;
                    if (m.pk2 > m.pk1) return a;
                }
                return null;
            }

            /* Melhores terceiros colocados */
            function getBestThirds() {
                if (!allGroupsComplete()) return [];
                const thirds = [];
                for (const g of Object.keys(GROUPS).sort()) {
                    const std = standings(g);
                    if (std.length >= 3) thirds.push({ team: std[2].name, group: g, ...std[2] });
                }
                thirds.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.sg !== a.sg) return b.sg - a.sg;
                    if (b.gp !== a.gp) return b.gp - a.gp;
                    return a.team.localeCompare(b.team, 'pt');
                });
                return thirds.slice(0, 8);
            }

            function autoAssignThirds() {
                if (!allGroupsComplete()) return;
                const best = getBestThirds();
                if (best.length < 8) return;
                // IDs dos jogos com '3X', na ordem em que aparecem
                const thirdMatchIds = [74, 77, 79, 80, 81, 82, 85, 88];
                const matches = thirdMatchIds.map(id => findMatch(id)).filter(Boolean);
                matches.forEach((m, i) => {
                    if (i < best.length) {
                        const team = best[i].team;
                        if (m.t1 === '3X') m.m1 = team;
                        if (m.t2 === '3X') m.m2 = team;
                    }
                });
                persist();
            }

            /* =============================================

               ============================================= */
            function renderGrupos() {
                const grid = document.getElementById('gruposGrid');
                grid.innerHTML = '';
                Object.keys(GROUPS).sort().forEach(letra => {
                    const std = standings(letra);
                    const complete = groupComplete(letra);
                    const card = document.createElement('div');
                    card.className = 'grupo-card';
                    card.innerHTML = `
                <div class="grupo-head">
                  Grupo ${letra}
                  <span class="badge ${complete ? 'complete' : 'progress'}">${complete ? 'Encerrado' : 'Em andamento'}</span>
                </div>
                <table class="standings-table">
                  <thead><tr>
                    <th>#</th><th style="text-align:left">Seleção</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th>
                  </tr></thead>
                  <tbody>${std.map((t,i) => {
                    const rowClass = (complete && i===0) ? 'qualified' : (complete && i===1) ? 'second' : '';
                    return `<tr class="${rowClass}">
                      <td><span class="pos-num">${i+1}</span></td>
                      <td class="team-cell" onclick="window._openModal('${escAttr(t.name)}')">
                        <div class="team-cell-inner">
                          <img class="flag" src="${flagUrl(t.name)}" alt="" loading="lazy">
                          ${esc(t.name)}
                        </div>
                      </td>
                      <td style="font-weight:700">${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td>
                      <td>${t.gp}</td><td>${t.gc}</td><td>${t.sg}</td>
                    </tr>`;
                  }).join('')}</tbody>
                </table>`;
                    grid.appendChild(card);
                });
            }

            /* =============================================
               RENDER: ELIMINATÓRIAS
               ============================================= */
            function renderElim() {
                const cont = document.getElementById('elimContainer');
                cont.innerHTML = '';
                const fases = ['16avos', 'oitavas', 'quartas', 'semis', '3lugar', 'final'];
                fases.forEach(fase => {
                    const matches = MATCHES.filter(m => m.fase === fase);
                    if (!matches.length) return;
                    const sec = document.createElement('div');
                    sec.className = 'fase-section';
                    let html = `<div class="fase-title">${FASE_LABELS[fase]}</div><div class="bracket-grid">`;
                    matches.forEach(m => {
                        const t1 = resolveTeam(m.t1, m, 1);
                        const t2 = resolveTeam(m.t2, m, 2);
                        const hasScore = m.g1 !== null && m.g2 !== null;
                        const winner = hasScore ? getWinner(m.id) : null;
                        html += `<div class="match-card">
                  <div class="match-meta">${m.data} • ${m.hora}</div>
                  <div class="match-row ${winner===t1?'winner':''}">
                    ${t1 ? `<div class="team" onclick="window._openModal('${escAttr(t1)}')"><img class="flag" src="${flagUrl(t1)}" alt="" loading="lazy"><span>${esc(t1)}</span></div>` : '<div class="team tbd"><span>A definir</span></div>'}
                    <span class="score">${hasScore ? m.g1 : '–'}</span>
                  </div>
                  <div class="match-divider"></div>
                  <div class="match-row ${winner===t2?'winner':''}">
                    ${t2 ? `<div class="team" onclick="window._openModal('${escAttr(t2)}')"><img class="flag" src="${flagUrl(t2)}" alt="" loading="lazy"><span>${esc(t2)}</span></div>` : '<div class="team tbd"><span>A definir</span></div>'}
                    <span class="score">${hasScore ? m.g2 : '–'}</span>
                  </div>
                  ${hasScore && m.g1===m.g2 && isKnockout(m.fase) && (m.pk1!==null||m.pk2!==null) ? `<div class="pk-info">Pênaltis: ${m.pk1 ?? '?'} – ${m.pk2 ?? '?'}</div>` : ''}
                </div>`;
                    });
                    html += '</div>';
                    sec.innerHTML = html;
                    cont.appendChild(sec);
                });
            }

            /* =============================================
               RENDER: PARTIDAS
               ============================================= */
            let currentFilter = 'todas';
            const FILTERS = [
                ['todas', 'Todas'],
                ['grupos', 'Grupos'],
                ['16avos', '16 Avos'],
                ['oitavas', 'Oitavas'],
                ['quartas', 'Quartas'],
                ['semis', 'Semifinais'],
                ['3lugar', '3º Lugar'],
                ['final', 'Final']
            ];

            function renderFilters() {
                const container = document.getElementById('filters');
                container.innerHTML = FILTERS.map(([k, l]) =>
                    `<button class="filter-chip ${k===currentFilter?'active':''}" data-filter="${k}">${l}</button>`
                ).join('');
                container.querySelectorAll('.filter-chip').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentFilter = btn.dataset.filter;
                        renderPartidas();
                    });
                });
            }

            function renderPartidas() {
                renderFilters();
                const cont = document.getElementById('partidasContainer');
                cont.innerHTML = '';
                const FASE_ORDER = ['grupos', '16avos', 'oitavas', 'quartas', 'semis', '3lugar', 'final'];
                FASE_ORDER.forEach(fase => {
                    const items = MATCHES.filter(m => m.fase === fase && (currentFilter === 'todas' ||
                        currentFilter === fase));
                    if (!items.length) return;
                    const doneCount = items.filter(m => m.g1 !== null && m.g2 !== null).length;
                    const header = document.createElement('div');
                    header.className = 'fase-header';
                    header.innerHTML =
                        `${FASE_LABELS[fase]} <span class="count-badge">${doneCount}/${items.length}</span>`;
                    cont.appendChild(header);
                    items.forEach(m => cont.appendChild(buildMatchItem(m)));
                });
            }

            function buildMatchItem(m) {
                const t1 = resolveTeam(m.t1, m, 1);
                const t2 = resolveTeam(m.t2, m, 2);
                const canScore = !!(t1 && t2);
                const hasDone = m.g1 !== null && m.g2 !== null;
                const ko = isKnockout(m.fase);
                const showPK = hasDone && m.g1 === m.g2 && ko;

                const row = document.createElement('div');
                row.className = `match-item${hasDone ? ' done' : ''}`;
                row.dataset.matchId = m.id;

                let team1HTML, team2HTML;
                if (m.t1 === '3X') {
                    team1HTML = buildManualSelect(m, 1);
                } else if (t1) {
                    team1HTML =
                        `<div class="team-name-btn" onclick="window._openModal('${escAttr(t1)}')"><img class="flag" src="${flagUrl(t1)}" alt="" loading="lazy">${esc(t1)}</div>`;
                } else {
                    team1HTML = '<div class="team-name-btn tbd">A definir</div>';
                }

                if (m.t2 === '3X') {
                    team2HTML = buildManualSelect(m, 2);
                } else if (t2) {
                    team2HTML =
                        `<div class="team-name-btn" onclick="window._openModal('${escAttr(t2)}')"><img class="flag" src="${flagUrl(t2)}" alt="" loading="lazy">${esc(t2)}</div>`;
                } else {
                    team2HTML = '<div class="team-name-btn tbd">A definir</div>';
                }

                const v1 = m.g1 !== null ? m.g1 : '';
                const v2 = m.g2 !== null ? m.g2 : '';
                row.innerHTML = `
              <div class="match-date"><span>${m.data}</span><span class="time">${m.hora}</span></div>
              <div class="team-block">${team1HTML}</div>
              <div>
                <div class="score-group">
                  <input class="score-input" type="number" min="0" id="g1_${m.id}" value="${v1}" ${canScore?'':'disabled'} aria-label="Gols time 1">
                  <span class="score-sep">×</span>
                  <input class="score-input" type="number" min="0" id="g2_${m.id}" value="${v2}" ${canScore?'':'disabled'} aria-label="Gols time 2">
                  <div class="save-dot" id="dot_${m.id}"></div>
                </div>
                ${ko ? `<div class="pk-group" id="pkGroup_${m.id}" style="display:${showPK?'flex':'none'}">
                  Pên: <input type="number" min="0" id="pk1_${m.id}" value="${m.pk1??''}" aria-label="Pênaltis time 1">
                  – <input type="number" min="0" id="pk2_${m.id}" value="${m.pk2??''}" aria-label="Pênaltis time 2">
                </div>` : ''}
              </div>
              <div class="team-block right">${team2HTML}</div>`;

                if (canScore) {
                    const g1el = row.querySelector(`#g1_${m.id}`);
                    const g2el = row.querySelector(`#g2_${m.id}`);
                    const pk1el = row.querySelector(`#pk1_${m.id}`);
                    const pk2el = row.querySelector(`#pk2_${m.id}`);

                    function tryAutoSave() {
                        const v1r = g1el.value.trim(),
                            v2r = g2el.value.trim();
                        if (v1r === '' && v2r === '') {
                            if (m.g1 !== null || m.g2 !== null) {
                                m.g1 = null;
                                m.g2 = null;
                                m.pk1 = null;
                                m.pk2 = null;
                                persist();
                                flashDot(m.id);
                                onMatchUpdate();
                            }
                            return;
                        }
                        if (v1r === '' || v2r === '') return;
                        const n1 = parseInt(v1r, 10),
                            n2 = parseInt(v2r, 10);
                        if (!Number.isInteger(n1) || !Number.isInteger(n2) || n1 < 0 || n2 < 0) return;
                        if (m.g1 === n1 && m.g2 === n2) return;
                        m.g1 = n1;
                        m.g2 = n2;
                        if (ko && pk1el) {
                            const pg = row.querySelector(`#pkGroup_${m.id}`);
                            if (pg) pg.style.display = (n1 === n2) ? 'flex' : 'none';
                            if (n1 !== n2) { m.pk1 = null;
                                m.pk2 = null; }
                        }
                        persist();
                        flashDot(m.id);
                        onMatchUpdate();
                    }

                    function savePK() {
                        if (!pk1el || !pk2el) return;
                        const pv1 = pk1el.value.trim(),
                            pv2 = pk2el.value.trim();
                        if (pv1 === '' || pv2 === '') return;
                        const pn1 = parseInt(pv1, 10),
                            pn2 = parseInt(pv2, 10);
                        if (!Number.isInteger(pn1) || !Number.isInteger(pn2) || pn1 < 0 || pn2 < 0) return;
                        m.pk1 = pn1;
                        m.pk2 = pn2;
                        persist();
                        flashDot(m.id);
                        onMatchUpdate();
                    }

                    g1el.addEventListener('blur', tryAutoSave);
                    g2el.addEventListener('blur', tryAutoSave);
                    g1el.addEventListener('keydown', e => { if (e.key === 'Enter') g2el.focus(); });
                    g2el.addEventListener('keydown', e => { if (e.key === 'Enter') tryAutoSave(); });
                    if (pk1el) pk1el.addEventListener('blur', savePK);
                    if (pk2el) pk2el.addEventListener('blur', savePK);
                }

                // Delegação para selects manuais
                row.querySelectorAll('select').forEach(sel => {
                    sel.addEventListener('change', function() {
                        const matchId = parseInt(this.dataset.match);
                        const side = parseInt(this.dataset.side);
                        const m = findMatch(matchId);
                        if (side === 1) m.m1 = this.value || null;
                        else m.m2 = this.value || null;
                        persist();
                        onMatchUpdate();
                    });
                });

                return row;
            }

            function buildManualSelect(m, side) {
                const current = side === 1 ? m.m1 : m.m2;
                const opts = ALL_TEAMS.map(t =>
                    `<option value="${escAttr(t)}" ${current===t?'selected':''}>${esc(t)}</option>`
                ).join('');
                return `<select data-match="${m.id}" data-side="${side}" aria-label="Selecionar 3º colocado">
              <option value="">Selecionar…</option>${opts}</select>`;
            }

            function flashDot(id) {
                const dot = document.getElementById('dot_' + id);
                if (!dot) return;
                dot.classList.add('visible');
                setTimeout(() => dot.classList.remove('visible'), 1600);
            }

            function onMatchUpdate() {
                if (allGroupsComplete()) {
                    autoAssignThirds();
                }
                if (currentTab === 'grupos') renderGrupos();
                if (currentTab === 'elim') renderElim();
                if (currentTab === 'partidas') renderPartidas();
                else {
                    renderGrupos();
                    renderElim();
                }
            }

            /* =============================================
               MODAL DE SELEÇÃO
               ============================================= */
            function openModal(team) {
                const grupo = teamGroup(team);
                document.getElementById('modalFlag').src = flagUrl(team, 80);
                document.getElementById('modalFlag').alt = team;
                document.getElementById('modalName').textContent = team;
                document.getElementById('modalGrupo').textContent = grupo ? `Grupo ${grupo}` :
                    'Copa do Mundo 2026';

                let stats = { j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, pts: 0 };
                let historico = [];
                MATCHES.forEach(m => {
                    if (m.g1 === null || m.g2 === null) return;
                    const a = resolveTeam(m.t1, m, 1);
                    const b = resolveTeam(m.t2, m, 2);
                    if (a !== team && b !== team) return;
                    const myG = a === team ? m.g1 : m.g2;
                    const oppG = a === team ? m.g2 : m.g1;
                    const opp = a === team ? b : a;
                    stats.j++;
                    stats.gp += myG;
                    stats.gc += oppG;
                    let res;
                    if (myG > oppG) { stats.v++;
                        stats.pts += 3;
                        res = 'V'; } else if (myG < oppG) { stats.d++;
                        res = 'D'; } else { stats.e++;
                        stats.pts++;
                        res = 'E'; }
                    historico.push({ id: m.id, opp, myG, oppG, res, fase: FASE_LABELS[m.fase] + (m.grupo ?
                            ` (Grupo ${m.grupo})` : '') });
                });
                const sg = stats.gp - stats.gc;
                const aprov = stats.j > 0 ? Math.round(stats.pts / (stats.j * 3) * 100) : 0;
                document.getElementById('modalStats').innerHTML = [
                    ['Jogos', stats.j],
                    ['Vitórias', stats.v],
                    ['Empates', stats.e],
                    ['Derrotas', stats.d],
                    ['Gols Pró', stats.gp],
                    ['Gols Contra', stats.gc],
                    ['Saldo', (sg > 0 ? '+' : '') + sg],
                    ['Pontos', stats.pts],
                    ['Aproveit.', aprov + '%']
                ].map(([l, v]) =>
                    `<div class="stat-item"><div class="value">${v}</div><div class="label">${l}</div></div>`
                ).join('');

                let statusHtml = '';
                if (grupo && groupComplete(grupo)) {
                    const std = standings(grupo);
                    const idx = std.findIndex(t => t.name === team);
                    statusHtml = idx < 2 ?
                        '<span class="status-badge classificado">✓ Classificado</span>' :
                        '<span class="status-badge eliminado">✕ Eliminado</span>';
                } else if (grupo) {
                    statusHtml = '<span class="status-badge andamento">● Em andamento</span>';
                }
                document.getElementById('modalStatus').innerHTML = statusHtml;

                historico.sort((a, b) => b.id - a.id);
                const recent = historico.slice(0, 5);
                const ul = document.getElementById('modalRecent');
                if (!recent.length) {
                    ul.innerHTML = '<li>Nenhum resultado registrado ainda.</li>';
                } else {
                    ul.innerHTML = recent.map(h => `
                <li>
                  <span><span class="result-badge ${h.res}">${h.res}</span> vs ${esc(h.opp)}: ${h.myG} × ${h.oppG}</span>
                  <span class="recent-fase">${esc(h.fase)}</span>
                </li>`).join('');
                }

                document.getElementById('modalOverlay').classList.add('open');
                document.getElementById('modalName').focus();
            }

            function closeModal() {
                document.getElementById('modalOverlay').classList.remove('open');
            }

            window._openModal = openModal;

            document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', e => {
                if (e.target === e.currentTarget) closeModal();
            });
            document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

            /* =============================================
               TOAST
               ============================================= */
            let toastTimer;

            function showToast(msg) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
            }

            /* =============================================
               EXPORTAÇÃO / IMPORTAÇÃO / RESET
               ============================================= */
            document.getElementById('btnExport').addEventListener('click', () => {
                persist();
                const data = {
                    versao: 'copa2026_v6',
                    geradoEm: new Date().toISOString(),
                    partidas: MATCHES.map(m => ({ id: m.id, g1: m.g1, g2: m.g2, pk1: m.pk1, pk2: m.pk2,
                        m1: m.m1, m2: m.m2 }))
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'copa2026.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Dados exportados com sucesso!');
            });

            document.getElementById('importFile').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        const map = {};
                        (data.partidas || []).forEach(p => map[p.id] = p);
                        MATCHES.forEach(m => {
                            const s = map[m.id];
                            if (!s) return;
                            m.g1 = s.g1 ?? null;
                            m.g2 = s.g2 ?? null;
                            m.pk1 = s.pk1 ?? null;
                            m.pk2 = s.pk2 ?? null;
                            m.m1 = s.m1 ?? null;
                            m.m2 = s.m2 ?? null;
                        });
                        persist();
                        if (allGroupsComplete()) autoAssignThirds();
                        renderAll();
                        showToast('Dados importados com sucesso!');
                    } catch (err) {
                        showToast('Erro ao importar arquivo JSON.');
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            });

            document.getElementById('btnReset').addEventListener('click', () => {
                if (!confirm(
                        'Tem certeza que deseja resetar TODOS os resultados? Esta ação não pode ser desfeita.'))
                    return;
                MATCHES.forEach(m => { m.g1 = null;
                    m.g2 = null;
                    m.pk1 = null;
                    m.pk2 = null;
                    m.m1 = null;
                    m.m2 = null; });
                localStorage.removeItem(STORAGE_KEY);
                renderAll();
                showToast('Dados resetados.');
            });

            document.getElementById('mobileNav').addEventListener('change', function() {
                switchTab(this.value);
            });

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            /* =============================================
               HELPERS
               ============================================= */
            function esc(str) {
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g,
                    '&quot;');
            }

            function escAttr(str) { return esc(str); }

            /* =============================================
               INICIALIZAÇÃO
               ============================================= */
            loadState();
            if (allGroupsComplete()) autoAssignThirds();
            renderAll();
        })();
    </script>
</body>
</html>
