<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026 — Acompanhamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --navy:#0d1b3e;
  --red:#c41e3a;
  --gold:#ffd700;
  --dark:#060e20;
  --card:#13245a;
  --text:#eef1fb;
  --muted:#9aa6cf;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Barlow',sans-serif;
  background:linear-gradient(180deg,var(--dark),var(--navy));
  color:var(--text);
  min-height:100vh;
}
h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
header{
  background:var(--dark);
  border-bottom:3px solid var(--gold);
  padding:14px 20px;
  display:flex;flex-wrap:wrap;align-items:center;gap:14px;
  position:sticky;top:0;z-index:50;
}
header h1{
  margin:0;font-size:1.8rem;color:var(--gold);
  flex:1 1 auto;white-space:nowrap;
}
nav{display:flex;gap:8px;flex-wrap:wrap;}
nav button{
  background:var(--card);color:var(--text);border:2px solid transparent;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;
  padding:8px 16px;border-radius:6px;cursor:pointer;transition:.15s;
  text-transform:uppercase;letter-spacing:.5px;
}
nav button:hover{border-color:var(--gold);}
nav button.active{background:var(--red);color:#fff;}
.mobile-select{display:none;}
.mobile-select select{
  width:100%;padding:10px;border-radius:6px;border:2px solid var(--gold);
  background:var(--card);color:var(--text);font-size:1rem;font-family:'Barlow Condensed',sans-serif;
}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.actions button,.actions label{
  background:var(--gold);color:var(--dark);border:none;font-weight:700;
  padding:8px 14px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
  font-size:.95rem;display:inline-flex;align-items:center;gap:6px;transition:.15s;
}
.actions button:hover,.actions label:hover{background:#fff2a8;}
.actions .danger{background:var(--red);color:#fff;}
.actions .danger:hover{background:#e0405a;}
.actions input[type=file]{display:none;}

main{padding:20px;max-width:1300px;margin:0 auto;}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadein .25s;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* GRUPOS */
.grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.grupo-card{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 14px rgba(0,0,0,.3);}
.grupo-card h3{
  margin:0;padding:10px 14px;background:var(--red);color:#fff;font-size:1.4rem;
}
.grupo-card table{width:100%;border-collapse:collapse;font-family:'Barlow Condensed',sans-serif;}
.grupo-card th,.grupo-card td{padding:6px 6px;text-align:center;font-size:.9rem;border-bottom:1px solid rgba(255,255,255,.06);}
.grupo-card th{color:var(--gold);font-weight:700;text-transform:uppercase;font-size:.75rem;}
.grupo-card td.team-cell{text-align:left;display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;}
.grupo-card tr.qualified td{background:rgba(255,215,0,.08);}
.grupo-card img.flag{width:22px;height:16px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,.2);}
.pos-badge{display:inline-block;width:18px;text-align:center;font-weight:700;color:var(--muted);}

/* ELIMINATORIAS */
.fase-section{margin-bottom:26px;}
.fase-section h3{
  border-left:5px solid var(--gold);padding-left:10px;font-size:1.6rem;color:var(--gold);
}
.bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.match-card{
  background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid rgba(255,255,255,.08);
}
.match-card .meta{font-size:.75rem;color:var(--muted);margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;}
.match-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.match-row .team{display:flex;align-items:center;gap:8px;font-weight:600;cursor:pointer;flex:1;min-width:0;}
.match-row .team.tbd{color:var(--muted);cursor:default;font-style:italic;font-weight:400;}
.match-row .team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.match-row .score{font-family:'Bebas Neue';font-size:1.3rem;color:var(--gold);min-width:24px;text-align:center;}
.match-row.winner .team{color:var(--gold);}
img.flag{width:24px;height:18px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,.2);flex-shrink:0;}
.vs-sep{height:1px;background:rgba(255,255,255,.08);margin:2px 0;}

/* PARTIDAS */
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.filtros button{
  background:var(--card);border:2px solid transparent;color:var(--text);padding:6px 12px;
  border-radius:20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.9rem;
}
.filtros button.active{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.fase-grupo-header{
  font-family:'Bebas Neue';color:var(--gold);font-size:1.3rem;margin:18px 0 8px;
  border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:4px;
}
.partida-item{
  background:var(--card);border-radius:8px;padding:10px 14px;margin-bottom:8px;
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.06);
}
.partida-item .datahora{
  font-family:'Barlow Condensed';font-size:.8rem;color:var(--muted);min-width:110px;
}
.partida-item .team-block{display:flex;align-items:center;gap:8px;flex:1;min-width:140px;}
.partida-item .team-name{font-weight:600;cursor:pointer;}
.partida-item .team-name:hover{color:var(--gold);}
.partida-item select{
  background:var(--navy);color:var(--text);border:1px solid var(--gold);border-radius:4px;padding:4px;font-size:.85rem;max-width:160px;
}
.score-box{display:flex;align-items:center;gap:6px;}
.score-box input{
  width:46px;text-align:center;padding:6px 2px;border-radius:5px;border:1px solid var(--muted);
  background:var(--navy);color:var(--text);font-size:1rem;font-family:'Bebas Neue';
}
.score-box span{color:var(--muted);font-weight:700;}
.btn-salvar{
  background:var(--red);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-weight:700;
  cursor:pointer;font-family:'Barlow Condensed';transition:.15s;
}
.btn-salvar:hover{background:#e0405a;}
.btn-salvar:disabled{background:#555;cursor:not-allowed;}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--card);border-radius:12px;max-width:480px;width:90%;padding:24px;
  border:2px solid var(--gold);position:relative;max-height:85vh;overflow-y:auto;
}
.modal-box .close-btn{
  position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text);
  font-size:1.6rem;cursor:pointer;line-height:1;
}
.modal-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.modal-head img{width:64px;height:48px;object-fit:cover;border-radius:4px;box-shadow:0 0 0 1px rgba(255,255,255,.2);}
.modal-head h2{margin:0;font-size:1.8rem;}
.modal-head .grupo-tag{color:var(--gold);font-size:.9rem;font-family:'Barlow Condensed';}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-grid .stat{background:var(--navy);border-radius:6px;padding:8px;text-align:center;}
.stat-grid .stat .v{font-family:'Bebas Neue';font-size:1.4rem;color:var(--gold);}
.stat-grid .stat .l{font-size:.7rem;color:var(--muted);text-transform:uppercase;}
.status-tag{
  display:inline-block;padding:4px 12px;border-radius:20px;font-weight:700;font-size:.85rem;
  margin-bottom:12px;text-transform:uppercase;
}
.status-tag.classificado{background:#1d8a4a;color:#fff;}
.status-tag.eliminado{background:var(--red);color:#fff;}
.status-tag.andamento{background:#555;color:#fff;}
.ultimos h4{margin:8px 0;color:var(--gold);font-family:'Barlow Condensed';}
.ultimos ul{list-style:none;padding:0;margin:0;}
.ultimos li{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.9rem;display:flex;justify-content:space-between;}
.ultimos li span.fase{color:var(--muted);font-size:.75rem;}

/* TOAST */
#toast{
  position:fixed;bottom:20px;right:20px;background:var(--gold);color:var(--dark);
  padding:12px 20px;border-radius:8px;font-weight:700;z-index:300;
  transform:translateY(100px);opacity:0;transition:.3s;font-family:'Barlow Condensed';
}
#toast.show{transform:translateY(0);opacity:1;}

@media (max-width:768px){
  nav{display:none;}
  .mobile-select{display:block;flex:1 1 100%;order:3;}
  header h1{font-size:1.4rem;}
  .actions{order:2;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
}

    <button data-tab="partidas" onclick="switchTab('partidas')">Partidas</button>

    <select id="mobileNav" onchange="switchTab(this.value)">

      <option value="elim">Eliminatórias</option>
      <option value="partidas">Partidas</option>
    </select>
  </div>
  <div class="actions">
    <button onclick="salvarTudo()">💾 Salvar</button>
    <label for="importFile">📥 Importar
      <input type="file" id="importFile" accept=".json" onchange="importarJSON(event)">
    </label>
    <button class="danger" onclick="resetarDados()">↺ Resetar</button>
  </div>
</header>

<main>
  <section id="tab-grupos" class="tab-content active">
    <div class="grupos-grid" id="gruposGrid"></div>
  </section>

  <section id="tab-elim" class="tab-content">
    <div id="elimContainer"></div>
  </section>

  <section id="tab-partidas" class="tab-content">
    <div class="filtros" id="filtros"></div>
    <div id="partidasContainer"></div>
  </section>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">

    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-head">
      <img id="modalFlag" src="" alt="">

/* ============ ESTADO ============ */
let MATCHES = RAW_MATCHES.map(r=>({
  id:r[0], fase:r[1], grupo:r[2], t1:r[3], t2:r[4], data:r[5], hora:r[6],
  g1:null, g2:null, m1:null, m2:null
}));

const STORAGE_KEY = 'copa2026_v3';

function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  try{
    const saved = JSON.parse(raw);
    const map = {};
    (saved.partidas||[]).forEach(p=>map[p.id]=p);
    MATCHES.forEach(m=>{
      const s = map[m.id];
      if(s){
        m.g1 = (s.g1===undefined||s.g1===null)?null:s.g1;
        m.g2 = (s.g2===undefined||s.g2===null)?null:s.g2;
        m.m1 = s.m1||null;
        m.m2 = s.m2||null;
      }
    });
  }catch(e){console.error('Erro ao carregar dados salvos',e);}
}
function persist(){
  const data = {partidas: MATCHES.map(m=>({id:m.id,g1:m.g1,g2:m.g2,m1:m.m1,m2:m.m2}))};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ============ LÓGICA DE CÁLCULO ============ */
function findMatch(id){ return MATCHES.find(m=>m.id===id); }

function groupMatches(letra){ return MATCHES.filter(m=>m.fase==='grupos' && m.grupo===letra); }

function groupComplete(letra){
  return groupMatches(letra).every(m=>m.g1!==null && m.g2!==null && m.g1!==undefined && m.g2!==undefined);
}
function allGroupsComplete(){
  return Object.keys(GROUPS).every(g=>groupComplete(g));
}

function standings(letra){
  const table = {};
  GROUPS[letra].forEach(name=>table[name]={name,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0,pts:0});
  groupMatches(letra).forEach(m=>{
    if(m.g1===null||m.g2===null) return;
    const a=table[m.t1], b=table[m.t2];
    a.j++; b.j++;
    a.gp+=m.g1; a.gc+=m.g2;
    b.gp+=m.g2; b.gc+=m.g1;
    if(m.g1>m.g2){a.v++;a.pts+=3;b.d++;}
    else if(m.g1<m.g2){b.v++;b.pts+=3;a.d++;}
    else {a.e++;b.e++;a.pts++;b.pts++;}
  });
  const arr = Object.values(table);
  arr.forEach(t=>t.sg=t.gp-t.gc);
  arr.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.sg!==a.sg) return b.sg-a.sg;
    if(b.gp!==a.gp) return b.gp-a.gp;
    return a.name.localeCompare(b.name,'pt');
  });
  return arr;
}

function resolveTeam(code, match){
  if(code===null || code===undefined) return null;
  if(code==='3X'){
    return match.t1==='3X' ? match.m1 : match.m2;
  }
  let mm;
  if((mm=code.match(/^([12])([A-L])$/))){
    if(!allGroupsComplete()) return null;
    const std = standings(mm[2]);
    return std[parseInt(mm[1])-1].name;
  }
  if((mm=code.match(/^W(\d+)$/))) return getWinner(parseInt(mm[1]));
  if((mm=code.match(/^L(\d+)$/))) return getLoser(parseInt(mm[1]));
  // código literal de seleção
  return code;
}
function getWinner(id){
  const m = findMatch(id);
  if(!m) return null;
  const a = resolveTeam(m.t1,m), b = resolveTeam(m.t2,m);
  if(!a || !b || m.g1===null || m.g2===null) return null;
  if(m.g1>m.g2) return a;
  if(m.g2>m.g1) return b;
  return null; // empate em mata-mata não suportado sem dados de pênaltis
}
function getLoser(id){
  const m = findMatch(id);
  if(!m) return null;
  const a = resolveTeam(m.t1,m), b = resolveTeam(m.t2,m);
  if(!a || !b || m.g1===null || m.g2===null) return null;
  if(m.g1>m.g2) return b;
  if(m.g2>m.g1) return a;
  return null;
}
function isManualSlot(match,side){
  return (side===1 ? match.t1 : match.t2) === '3X';
}

/* ============ NAVEGAÇÃO ============ */
function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('mobileNav').value = tab;
}

/* ============ RENDER GRUPOS ============ */
function renderGrupos(){
  const grid = document.getElementById('gruposGrid');
  grid.innerHTML='';
  Object.keys(GROUPS).sort().forEach(letra=>{
    const std = standings(letra);
    const complete = groupComplete(letra);
    const card = document.createElement('div');
    card.className='grupo-card';
    card.innerHTML = `<h3>Grupo ${letra}</h3>
      <table>
        <thead><tr><th>#</th><th style="text-align:left">Seleção</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead>
        <tbody>
          ${std.map((t,i)=>`
            <tr class="${complete && i<2 ? 'qualified':''}">
              <td><span class="pos-badge">${i+1}</span></td>
              <td class="team-cell" onclick="openModal('${t.name.replace(/'/g,"\\'")}')">
                <img class="flag" src="${flagUrl(t.name)}" alt="${t.name}">
                ${t.name}
              </td>
              <td>${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td>
              <td>${t.gp}</td><td>${t.gc}</td><td>${t.sg}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    grid.appendChild(card);
  });
}

/* ============ RENDER ELIMINATÓRIAS ============ */
function teamCell(code, match, side){
  const name = resolveTeam(code, match);
  if(!name) return `<div class="team tbd"><span>A definir</span></div>`;
  return `<div class="team" onclick="openModal('${name.replace(/'/g,"\\'")}')">
            <img class="flag" src="${flagUrl(name)}" alt="${name}"><span>${name}</span>
          </div>`;
}
function renderElim(){
  const cont = document.getElementById('elimContainer');
  cont.innerHTML='';
  const fases = [
    ['16avos','16-avos de Final'],
    ['oitavas','Oitavas de Final'],
    ['quartas','Quartas de Final'],
    ['semis','Semifinais'],
    ['3lugar','Disputa de 3º Lugar'],
    ['final','Final']
  ];
  fases.forEach(([fase,label])=>{
    const matches = MATCHES.filter(m=>m.fase===fase);
    const sec = document.createElement('div');
    sec.className='fase-section';
    let html = `<h3>${label}</h3><div class="bracket-grid">`;
    matches.forEach(m=>{
      const t1 = resolveTeam(m.t1,m), t2=resolveTeam(m.t2,m);
      const hasScore = m.g1!==null && m.g2!==null;
      const w1 = hasScore && m.g1>m.g2;
      const w2 = hasScore && m.g2>m.g1;
      html += `<div class="match-card">
        <div class="meta">${m.data} • ${m.hora}</div>
        <div class="match-row ${w1?'winner':''}">${teamCell(m.t1,m,1)}<div class="score">${hasScore?m.g1:'-'}</div></div>
        <div class="vs-sep"></div>
        <div class="match-row ${w2?'winner':''}">${teamCell(m.t2,m,2)}<div class="score">${hasScore?m.g2:'-'}</div></div>
      </div>`;
    });
    html += '</div>';
    sec.innerHTML = html;
    cont.appendChild(sec);
  });
}

/* ============ RENDER PARTIDAS ============ */
let filtroAtual = 'todas';
const FILTROS = [
  ['todas','Todas'],['grupos','Grupos'],['16avos','16 Avos'],['oitavas','Oitavas'],
  ['quartas','Quartas'],['semis','Semifinais'],['3lugar','3º Lugar'],['final','Final']
];
function renderFiltros(){
  const cont = document.getElementById('filtros');
  cont.innerHTML = FILTROS.map(([k,l])=>
    `<button class="${k===filtroAtual?'active':''}" onclick="setFiltro('${k}')">${l}</button>`).join('');
}
function setFiltro(f){ filtroAtual=f; renderFiltros(); renderPartidas(); }

function renderPartidas(){
  renderFiltros();
  const cont = document.getElementById('partidasContainer');
  cont.innerHTML='';
  let list = MATCHES.slice();
  if(filtroAtual!=='todas') list = list.filter(m=>m.fase===filtroAtual);

  // agrupar por fase, mantendo ordem dos IDs (já cronológica)
  const fasesOrdem = ['grupos','16avos','oitavas','quartas','semis','3lugar','final'];
  fasesOrdem.forEach(fase=>{
    const items = list.filter(m=>m.fase===fase);
    if(items.length===0) return;
    const header = document.createElement('div');
    header.className='fase-grupo-header';
    header.textContent = FASE_LABELS[fase] + (fase==='grupos'? '' : '');
    cont.appendChild(header);
    items.forEach(m=>cont.appendChild(renderPartidaItem(m)));
  });
}

function renderPartidaItem(m){
  const div = document.createElement('div');
  div.className='partida-item';

  const t1resolved = resolveTeam(m.t1,m);
  const t2resolved = resolveTeam(m.t2,m);

  let bloco1, bloco2;
  if(isManualSlot(m,1)){
    bloco1 = `<select onchange="setManual(${m.id},1,this.value)">
      <option value="">Selecionar (3º colocado)...</option>
      ${ALL_TEAMS.map(t=>`<option value="${t}" ${m.m1===t?'selected':''}>${t}</option>`).join('')}
    </select>`;
  } else if(t1resolved){
    bloco1 = `<img class="flag" src="${flagUrl(t1resolved)}" alt="${t1resolved}">
               <span class="team-name" onclick="openModal('${t1resolved.replace(/'/g,"\\'")}')">${t1resolved}</span>`;
  } else {
    bloco1 = `<span style="color:var(--muted);font-style:italic;">A definir</span>`;
  }

  if(isManualSlot(m,2)){
    bloco2 = `<select onchange="setManual(${m.id},2,this.value)">
      <option value="">Selecionar (3º colocado)...</option>
      ${ALL_TEAMS.map(t=>`<option value="${t}" ${m.m2===t?'selected':''}>${t}</option>`).join('')}
    </select>`;
  } else if(t2resolved){
    bloco2 = `<img class="flag" src="${flagUrl(t2resolved)}" alt="${t2resolved}">
               <span class="team-name" onclick="openModal('${t2resolved.replace(/'/g,"\\'")}')">${t2resolved}</span>`;
  } else {
    bloco2 = `<span style="color:var(--muted);font-style:italic;">A definir</span>`;
  }

  const canScore = !!(t1resolved && t2resolved);
  const v1 = m.g1===null||m.g1===undefined?'':m.g1;
  const v2 = m.g2===null||m.g2===undefined?'':m.g2;

  div.innerHTML = `
    <div class="datahora">${m.data} • ${m.hora}</div>
    <div class="team-block">${bloco1}</div>
    <div class="score-box">
      <input type="number" min="0" id="g1_${m.id}" value="${v1}" ${canScore?'':'disabled'}>
      <span>x</span>
      <input type="number" min="0" id="g2_${m.id}" value="${v2}" ${canScore?'':'disabled'}>
    </div>
    <div class="team-block">${bloco2}</div>
    <button class="btn-salvar" ${canScore?'':'disabled'} onclick="salvarPlacar(${m.id})">Salvar</button>
  `;
  return div;
}

function setManual(id, side, value){
  const m = findMatch(id);
  if(side===1) m.m1 = value || null;
  else m.m2 = value || null;
  persist();
  renderAll();
}

function salvarPlacar(id){
  const m = findMatch(id);
  const v1raw = document.getElementById('g1_'+id).value;
  const v2raw = document.getElementById('g2_'+id).value;
  const v1 = v1raw.trim(), v2 = v2raw.trim();

  if(v1==='' && v2===''){
    m.g1=null; m.g2=null;
    persist(); renderAll();
    showToast('Placar removido.');
    return;
  }
  if(v1==='' || v2===''){
    showToast('Preencha ambos os placares ou deixe ambos vazios.');
    return;
  }
  const n1 = parseInt(v1,10), n2 = parseInt(v2,10);
  if(isNaN(n1)||isNaN(n2)||n1<0||n2<0 || String(n1)!==v1 || String(n2)!==v2){
    showToast('Os placares devem ser números inteiros maiores ou iguais a 0.');
    return;
  }
  m.g1=n1; m.g2=n2;
  persist();
  renderAll();
  showToast('Placar salvo com sucesso!');
}

/* ============ MODAL DE ESTATÍSTICAS ============ */
function openModal(team){
  const grupo = teamGroup(team);
  document.getElementById('modalFlag').src = flagUrl(team,80);
  document.getElementById('modalFlag').alt = team;
  document.getElementById('modalName').textContent = team;
  document.getElementById('modalGrupo').textContent = grupo ? `Grupo ${grupo}` : 'Seleção qualificada';

  // estatísticas agregadas (todas as partidas com placar envolvendo o time)
  let stats = {j:0,v:0,e:0,d:0,gp:0,gc:0,pts:0};
  let historico = [];
  MATCHES.forEach(m=>{
    if(m.g1===null||m.g2===null) return;
    const a = resolveTeam(m.t1,m), b = resolveTeam(m.t2,m);
    if(a!==team && b!==team) return;
    const meusGols = a===team ? m.g1 : m.g2;
    const golsAdv = a===team ? m.g2 : m.g1;
    const adversario = a===team ? b : a;
    stats.j++; stats.gp+=meusGols; stats.gc+=golsAdv;
    let res;
    if(meusGols>golsAdv){stats.v++; stats.pts+=3; res='V';}
    else if(meusGols<golsAdv){stats.d++; res='D';}
    else {stats.e++; stats.pts++; res='E';}
    historico.push({id:m.id, adversario, placar:`${meusGols} x ${golsAdv}`, fase:FASE_LABELS[m.fase] + (m.grupo?` (Grupo ${m.grupo})`:''), res});
  });
  const sg = stats.gp - stats.gc;
  const aproveitamento = stats.j>0 ? Math.round((stats.pts/(stats.j*3))*100) : 0;

  const grid = document.getElementById('modalStats');
  const items = [
    ['Jogos',stats.j],['Vitórias',stats.v],['Empates',stats.e],['Derrotas',stats.d],
    ['Gols Pró',stats.gp],['Gols Contra',stats.gc],['Saldo',sg],['Pontos',stats.pts],
    ['Aproveitamento',aproveitamento+'%']
  ];
  grid.innerHTML = items.map(([l,v])=>`<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

  // status
  const statusEl = document.getElementById('modalStatus');
  let statusHtml = '';
  if(grupo){
    if(groupComplete(grupo)){
      const std = standings(grupo);
      const idx = std.findIndex(t=>t.name===team);
      if(idx<2) statusHtml = `<span class="status-tag classificado">Classificado</span>`;
      else statusHtml = `<span class="status-tag eliminado">Eliminado</span>`;
    } else {
      statusHtml = `<span class="status-tag andamento">Em andamento</span>`;
    }
  } else {
    statusHtml = `<span class="status-tag andamento">Em andamento</span>`;
  }
  statusEl.innerHTML = statusHtml;

  // últimos 5 (ordem cronológica: pelos IDs, mais recentes primeiro)
  historico.sort((a,b)=>b.id-a.id);
  const ultimos = historico.slice(0,5);
  const ul = document.getElementById('modalUltimos');
  if(ultimos.length===0){
    ul.innerHTML = `<li>Nenhum jogo registrado ainda.</li>`;
  } else {
    ul.innerHTML = ultimos.map(h=>`
      <li>
        <span>vs ${h.adversario}: <strong>${h.placar}</strong> (${h.res})</span>
        <span class="fase">${h.fase}</span>
      </li>`).join('');
  }

  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
});

/* ============ PERSISTÊNCIA / EXPORT / IMPORT / RESET ============ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2600);
}

function salvarTudo(){
  persist();
  const data = {
    versao:'copa2026_v3',
    geradoEm: new Date().toISOString(),
    partidas: MATCHES.map(m=>({id:m.id,g1:m.g1,g2:m.g2,m1:m.m1,m2:m.m2}))
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'copa2026_dados.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Dados salvos e exportados!');
}

function importarJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      const map = {};
      (data.partidas||[]).forEach(p=>map[p.id]=p);
      MATCHES.forEach(m=>{
        const s = map[m.id];
        if(s){
          m.g1 = (s.g1===undefined||s.g1===null)?null:s.g1;
          m.g2 = (s.g2===undefined||s.g2===null)?null:s.g2;
          m.m1 = s.m1||null;
          m.m2 = s.m2||null;
        }
      });
      persist();
      renderAll();
      showToast('Dados importados com sucesso!');
    }catch(err){
      console.error(err);
      showToast('Erro ao importar arquivo JSON.');
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

function resetarDados(){
  if(!confirm('Tem certeza que deseja resetar TODOS os dados (placares e seleções)? Esta ação não pode ser desfeita.')) return;
  MATCHES.forEach(m=>{m.g1=null;m.g2=null;m.m1=null;m.m2=null;});
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
  showToast('Dados resetados.');
}

/* ============ INIT ============ */
function renderAll(){
  renderGrupos();
  renderElim();
  renderPartidas();
}
loadState();
renderAll();
</script>
